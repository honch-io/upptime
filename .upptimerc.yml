owner: honch-io
repo: upptime

sites:
  - name: Honch Website
    url: https://honch.io

  - name: Honch Dashboard
    url: https://app.honch.io

  - name: Honch Ingest
    url: https://i.honch.io/health

  - name: Honch Docs
    url: https://docs.honch.io

# Down/up alerts. Upptime posts to Slack automatically when a service goes
# down and again when it recovers. Inert until the repo secrets below are set:
#   NOTIFICATION_SLACK             = true
#   NOTIFICATION_SLACK_WEBHOOK     = true
#   NOTIFICATION_SLACK_WEBHOOK_URL = <your Slack incoming-webhook URL>
notifications:
  - type: slack
    webhookUrl: $NOTIFICATION_SLACK_WEBHOOK_URL

status-website:
  cname: status.honch.io

  logoUrl: https://honch.io/favicon.ico

  name: Honch Status

  introTitle: "**Honch Status**"

  introMessage: >
    Live status and uptime monitoring for Honch services, including the
    platform, dashboard, ingest infrastructure, and documentation.

  navbar:
    - title: Status
      href: /

    - title: Website
      href: https://honch.io

    - title: Dashboard
      href: https://app.honch.io

    - title: Docs
      href: https://docs.honch.io

    - title: GitHub
      href: https://github.com/honch-io
