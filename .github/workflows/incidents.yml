#
# Caches incidents (GitHub issues + comments) to api/incidents.json so the
# status page renders from a committed snapshot instead of calling the GitHub
# API on every visitor load — which is rate-limited to 60 req/hr/IP when
# unauthenticated and made the incident history flap to "unavailable".
#
# Runs authenticated (5000 req/hr) on issue/comment events + every 30 min.
# The page reads api/incidents.json from the repo (raw), so visitors make zero
# GitHub API calls.
#
name: Cache Incidents
on:
  issues:
    types: [opened, edited, closed, reopened, deleted, labeled, unlabeled]
  issue_comment:
    types: [created, edited, deleted]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.ref_name }}-upptime
  cancel-in-progress: false
jobs:
  build:
    name: Cache incidents to JSON
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Build incidents cache
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          REPO: ${{ github.repository }}
        run: node scripts/build-incidents.mjs api/incidents.json
      - name: Commit if changed
        run: |
          if git diff --quiet -- api/incidents.json; then
            echo "no change."
            exit 0
          fi
          git config user.name "Upptime Bot"
          git config user.email "73812536+upptime-bot@users.noreply.github.com"
          git add api/incidents.json
          git commit -m "🪧 Update cached incidents [skip ci]"
          git push
