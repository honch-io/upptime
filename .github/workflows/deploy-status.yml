#
# Custom Honch status page deploy.
# ---------------------------------------------------------------------------
# This REPLACES Upptime's default `site.yml` (the Sapper/Svelte template build).
# It builds the custom status page in `web/` — a Vite + React + Tailwind app
# built with coss ui components (https://coss.com/ui) — and publishes the
# compiled output to gh-pages. The page reads Upptime's own data at runtime.
#
# All of Upptime's data-collection workflows (uptime, response-time, graphs,
# summary, updates) are untouched and keep committing data to `master`.
# Our page fetches that data client-side, so nothing about the "backend" changes.
#
# The RSS/Atom feeds are generated separately by `feeds.yml` (committed to
# status-page/); this workflow copies them into the build output so they keep
# publishing to status.honch.io/feed.rss and /feed.atom.
#
# NOTE: `update-template.yml` has been disabled so the template generator can no
# longer overwrite this file or resurrect `site.yml`. Re-enabling it will undo
# this customization.
# ---------------------------------------------------------------------------
name: Deploy Status Page
on:
  push:
    branches:
      - master
    paths:
      - "web/**"
      - "status-page/**"
      - ".github/workflows/deploy-status.yml"
  # The data workflows fire this dispatch after committing new results; we listen
  # so the page redeploys on the same cadence the default template would have.
  repository_dispatch:
    types: [static_site]
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.ref_name }}-upptime
  cancel-in-progress: false
jobs:
  deploy:
    name: Build and deploy custom status page
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Build status page
        working-directory: web
        run: npm run build
      - name: Assemble publish directory
        run: |
          # Carry the committed RSS/Atom feeds (built by feeds.yml) into the output.
          cp -f status-page/feed.rss status-page/feed.atom web/dist/ 2>/dev/null || true
          # Custom domain + disable Jekyll processing on gh-pages.
          echo "status.honch.io" > web/dist/CNAME
          touch web/dist/.nojekyll
      - uses: peaceiris/actions-gh-pages@v4
        name: GitHub Pages Deploy
        with:
          github_token: ${{ secrets.GH_PAT || github.token }}
          publish_dir: "web/dist"
          force_orphan: "false"
          user_name: "Upptime Bot"
          user_email: "73812536+upptime-bot@users.noreply.github.com"
